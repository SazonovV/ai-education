<style>
:root {

  --panel: #fffaf2;
  --ink: #1f1711;
  --muted: #665344;
  --line: #dccab3;
  --accent: #b4491d;

}

* { box-sizing: border-box; }

body {

  color: var(--ink);
  font-family: "Literata", Georgia, serif;
  background:
    radial-gradient(circle at 90% 10%, #ead4b1 0, transparent 30%),

}

.layout {

  grid-template-columns: 1fr 300px;
  gap: 16px;
}

.main {

}

.nav {

}

.btn {
  text-decoration: none;
  border: 1px solid var(--line);

  background: #fff4e6;
  border-radius: 999px;
  padding: 7px 11px;
  font-family: "Manrope", "Segoe UI", sans-serif;
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
}

.btn.primary {
  border-color: #cfb192;
  background: #f5dfc6;
}

#status {
  margin: 0;
  font-family: "Manrope", "Segoe UI", sans-serif;

}

}

#content h2 {
  font-size: clamp(24px, 3.5vw, 34px);

}

}

#content p,
#content li,
#content td,

  <div class="layout">
    <main class="main">
      <div class="nav">
        <a class="btn" href="../../">Главная</a>
        <a class="btn desktop-only" href="../../presentations/part1/">Слайды · Лекция 1</a>

        <a class="btn primary desktop-only" href="../../presentations/part3/">Слайды · Лекция 3</a>
        <a class="btn desktop-only" href="../part1/">Конспект · Лекция 1</a>
        <a class="btn desktop-only" href="../part2/">Конспект · Лекция 2</a>
      </div>
      <p id="status">Загружаю markdown…</p>
      <article id="content" hidden></article>
    </main>

    <aside class="side">
      <h3>Оглавление</h3>
      <nav id="toc" class="toc"></nav>
    </aside>
  </div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
const markdownPath = "../../content/part3_tools_mcp.md";
const statusEl = document.getElementById("status");
const contentEl = document.getElementById("content");
const tocEl = document.getElementById("toc");

marked.setOptions({
  gfm: true,
  breaks: false
});

function slugify(text) {
  const base = text
    .toLowerCase()
    .normalize("NFKD")
    .replace(/[^\p{Letter}\p{Number}]+/gu, "-")
    .replace(/^-+|-+$/g, "")
    .slice(0, 80);
  return base || "section";
}

function buildToc() {
  const headings = contentEl.querySelectorAll("h2, h3");
  tocEl.innerHTML = "";
  headings.forEach((h, i) => {
    if (!h.id) h.id = `${slugify(h.textContent)}-${i}`;
    const a = document.createElement("a");
    a.href = `#${h.id}`;
    a.textContent = h.textContent;
    a.className = h.tagName === "H3" ? "depth-3" : "depth-2";
    tocEl.appendChild(a);
  });
}

async function render() {
  try {
    const res = await fetch(markdownPath, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const markdown = await res.text();
    contentEl.innerHTML = marked.parse(markdown);
    contentEl.querySelectorAll("pre code").forEach((block) => {
      hljs.highlightElement(block);
    });
    contentEl.hidden = false;
    statusEl.remove();
    buildToc();
  } catch (err) {
    statusEl.textContent = "Не удалось загрузить markdown. Проверьте путь к файлу.";
    console.error(err);
  }
}

render();
</script>
